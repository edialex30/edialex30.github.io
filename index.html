<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PushUp Counter</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="screen-today" class="screen active" aria-labelledby="today-title">
      <header class="topbar">
        <div>
          <p class="eyebrow">Azi</p>
          <h1 id="today-title">PushUp Counter</h1>
        </div>
        <div class="pill"><span id="today-done">0</span> facute</div>
      </header>

      <div class="daily-progress">
        <div class="big-number"><span id="today-remaining">--</span></div>
        <p>ramase din <span id="today-goal">--</span></p>
      </div>

      <div class="actions">
        <button id="btn-start" class="primary" type="button">Start antrenament</button>
      </div>

      <form class="goal-editor" id="goal-form">
        <label for="goal-input">Tinta zilnica</label>
        <input id="goal-input" type="number" inputmode="numeric" min="1" value="100" />
        <button id="btn-save-goal" type="submit">Salveaza</button>
      </form>

      <form class="goal-editor" id="manual-reps-form">
        <label for="manual-reps-input">Flotari azi</label>
        <input id="manual-reps-input" type="number" inputmode="numeric" min="0" value="0" />
        <button id="btn-save-reps" type="submit">Actualizeaza</button>
      </form>
    </section>

    <section id="screen-workout" class="screen" aria-labelledby="workout-title">
      <header class="topbar compact">
        <div>
          <p class="eyebrow">Antrenament</p>
          <h1 id="workout-title">Camera</h1>
        </div>
        <button id="btn-stop" class="secondary" type="button">Stop</button>
      </header>

      <label class="camera-picker" for="camera-mode">
        Camera
        <select id="camera-mode">
          <option value="user">Fata</option>
          <option value="environment">Spate</option>
        </select>
      </label>

      <div class="calibration-panel">
        <p id="calibration-status" class="calibration-status">Calibrare necesara.</p>
        <div class="calibration-actions">
          <button id="btn-calibrate-up" class="secondary" type="button">Salveaza Sus</button>
          <button id="btn-calibrate-down" class="secondary" type="button">Salveaza Jos</button>
        </div>
      </div>

      <div class="video-wrap">
        <video id="video" playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div id="rep-count" class="rep-count">0</div>
      </div>
      <p id="detect-status" class="status">Porneste pentru a incepe.</p>
    </section>

    <section id="screen-stats" class="screen" aria-labelledby="stats-title">
      <header class="topbar">
        <div>
          <p class="eyebrow">Istoric</p>
          <h1 id="stats-title">Statistici</h1>
        </div>
      </header>

      <div class="stat-grid">
        <div class="stat"><span id="stat-total">0</span><label>Total</label></div>
        <div class="stat"><span id="stat-average">0</span><label>Medie/zi</label></div>
        <div class="stat"><span id="stat-best">0</span><label>Record/zi</label></div>
        <div class="stat"><span id="stat-streak">0</span><label>Serie</label></div>
        <div class="stat"><span id="stat-best-streak">0</span><label>Record serie</label></div>
      </div>

      <div class="chart-panel">
        <canvas id="chart"></canvas>
      </div>
    </section>
  </main>

  <nav class="tabs" aria-label="Navigare">
    <button data-screen="today" class="tab active" type="button">Azi</button>
    <button data-screen="workout" class="tab" type="button">Antrenament</button>
    <button data-screen="stats" class="tab" type="button">Statistici</button>
  </nav>

  <script src="./vendor/chart.umd.min.js"></script>
  <script type="module" src="./js/app.js?v=calibration-1"></script>
</body>
</html>
